<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Service Manager</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>

  <header class="topbar">
    <div class="topbar__brand">
      <span class="topbar__icon">⚡</span>
      <h1 class="topbar__title">Service Manager</h1>
    </div>
    <div class="topbar__meta">
      <span class="topbar__host" id="host-info">—</span>
      <span class="topbar__dot" id="connection-dot" title="Dashboard connection"></span>
    </div>
  </header>

  <div class="system-bar" id="system-bar"></div>

  <main class="dashboard">
    <div class="dashboard__header">
      <h2 class="dashboard__title">Services</h2>
      <div class="dashboard__controls">
        <button class="btn btn--start btn--sm" onclick="doStartAll()" title="Start all services">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="1 3 11 12 1 21"/><polygon points="13 3 23 12 13 21"/></svg>
          Start All
        </button>
        <button class="btn btn--stop btn--sm" onclick="doStopAll()" title="Stop all services">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="2" y="4" width="7" height="16" rx="1"/><rect x="15" y="4" width="7" height="16" rx="1"/></svg>
          Stop All
        </button>
        <span class="refresh-indicator" id="refresh-indicator" title="Auto-refreshes every 5s">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
          <span id="countdown">5s</span>
        </span>
        <button class="btn btn--ghost btn--sm" onclick="fetchAll()" title="Refresh now">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
        </button>
      </div>
    </div>

    <div class="status-summary" id="status-summary"></div>

    <div class="grid" id="services-grid">
      <div class="card card--loading">
        <p>Loading services...</p>
      </div>
    </div>
  </main>

  <div class="toast-container" id="toast-container"></div>

  <!-- Log Viewer Modal -->
  <div class="modal-overlay" id="log-modal" onclick="closeLogModal(event)">
    <div class="modal modal--wide">
      <div class="modal__header">
        <h3 class="modal__title" id="log-modal-title">Logs</h3>
        <div class="modal__tabs">
          <button class="modal__tab modal__tab--active" id="log-tab-live" onclick="switchLogTab('live')">Live</button>
          <button class="modal__tab" id="log-tab-archive" onclick="switchLogTab('archive')">Archive</button>
        </div>
        <button class="modal__close" onclick="closeLogModal()">✕</button>
      </div>
      <div class="modal__body">
        <div id="log-panel-live">
          <div class="log-viewer" id="log-viewer"><span class="log-empty">Loading…</span></div>
        </div>
        <div id="log-panel-archive" class="log-panel--hidden">
          <div class="archive-search">
            <input type="text" class="archive-search__input" id="archive-search-input"
              placeholder="Search archived logs… (leave empty to browse all)"
              onkeydown="if(event.key==='Enter')searchArchive()">
            <button class="btn btn--ghost btn--sm" onclick="searchArchive()">Search</button>
          </div>
          <div class="log-viewer" id="archive-viewer"><span class="log-empty">Enter a search term or press Search to browse.</span></div>
        </div>
      </div>
      <div class="modal__footer">
        <div id="log-footer-live">
          <button class="btn btn--ghost btn--sm" onclick="refreshLogs()">Refresh</button>
          <label class="log-tail-label">
            <input type="checkbox" id="log-tail" checked> Auto-tail
          </label>
        </div>
        <div id="log-footer-archive" class="log-panel--hidden">
          <span class="archive-stats" id="archive-stats"></span>
          <button class="btn btn--ghost btn--sm" id="archive-load-more" onclick="loadMoreArchive()" hidden>Load more</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Env Editor Modal -->
  <div class="modal-overlay" id="env-modal" onclick="closeEnvModal(event)">
    <div class="modal">
      <div class="modal__header">
        <h3 class="modal__title" id="env-modal-title">Service Settings</h3>
        <button class="modal__close" onclick="closeEnvModal()">✕</button>
      </div>
      <div class="modal__body" id="env-modal-body">
        <p class="modal__loading">Loading…</p>
      </div>
      <div class="modal__footer">
        <button class="btn btn--start btn--sm" onclick="saveEnvAndRestart()">Save &amp; Restart</button>
        <button class="btn btn--ghost btn--sm" onclick="closeEnvModal()">Cancel</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
