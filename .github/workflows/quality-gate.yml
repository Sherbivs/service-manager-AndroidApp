name: Quality Gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Quality Checks (Lint, ktlint, detekt)
        run: ./gradlew lint ktlintCheck detekt

      - name: Run Unit Tests
        run: ./gradlew test

      - name: Assemble Debug
        run: ./gradlew assembleDebug
